# Complete GEPA project profile example.
# Put stable project/runtime knowledge here. Task files reference this profile.
kind: project_profile
name: function-discovery-local

source:
  # Optional for artifact_directory, required for git_worktree.
  path: ../..
  default_ref: HEAD
  # artifact_directory gives each executor an artifact folder. git_worktree gives
  # each source-editing candidate an isolated Git worktree.
  workspace_mode: artifact_directory

isolation:
  backend: local
  workdir: /workspace/repo
  command: claude
  env:
    pass: []
    set: {}

docs: []

provided_paths:
  - path: data/observations.csv
    mode: ro
    role: data_file

reference:
  commands: []
  note: Use installed packages only; do not install packages during the loop.

repo_overlays: []
skills: []
pre_materialized_lfs_paths: []
generated_tracked_paths: []
hash_artifacts: []

agent:
  command: claude
  timeout_seconds: 900
  # model: opus         # optional: override the model
  # env:                # optional: extra environment variables for the Claude subprocess
  #   ANTHROPIC_API_KEY: sk-ant-...
  #   ANTHROPIC_BASE_URL: https://your-api-proxy.example.com
  extra_args:
    - --bare
    - --max-turns
    - "32"
    - --allowedTools
    - Read
    - --allowedTools
    - Write
    - --allowedTools
    - "Bash(conda run -n myenv python *)"
    - --allowedTools
    - "Bash(ls *)"
    - --allowedTools
    - "Bash(head *)"

safety:
  editable_paths:
    - examples/function_discovery/runs/**
  frozen_paths:
    - gepa_researcher/**
    - tests/**
  max_files_per_candidate: 5
