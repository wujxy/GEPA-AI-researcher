# OMILREC project profile template for the canonical config model.
kind: project_profile
name: omilrec-juno

source:
  path: ../../../omilrecv2
  default_ref: ff71809b81c6c887a276a14c29b4f86296f27571
  workspace_mode: git_worktree

docs:
  - ../../../omilrec-br111-executor-pack/context/BR111_OPTIMIZATION_CONTEXT.md
  - ../../../omilrec-br111-executor-pack/context/SEEDS_BR111.md
  - ../../../omilrec-br111-executor-pack/context/SOURCE_INVENTORY_BR111.json

provided_paths:
  - path: /cvmfs/juno.ihep.ac.cn/el9_amd64_gcc11/Release/J26.1.1
    mode: ro
    role: environment
    note: JUNO J26.1.1 runtime environment. User guarantees this path is sufficient with the project docs to run OMILREC.
  - path: /data/juno/dingxf/inputs
    mode: ro
    role: input_data
  - path: /data/juno/dingxf/OMILREC_maps
    mode: ro
    role: resource_pack

reference:
  commands:
    - source /cvmfs/juno.ihep.ac.cn/el9_amd64_gcc11/Release/J26.1.1/setup.sh
    - source InstallArea/setup.sh
    - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_UNIT_TESTS=ON
    - cmake --build build --target install --parallel
    - cmake --build build --target test_fcn --parallel
  note: These are user-provided reference commands for the executor; GEPA must not auto-execute them.

repo_overlays:
  - source: ../../../omilrec-br111-executor-pack/assets/fixtures/time_pdf.bin
    target: TEMP/fixtures/time_pdf.bin
    mode: ro
    purpose: fixture

skills:
  - omilrec-br111-opt-flow
  - OMILREC-dev-guide
  - reproduce-OMILREC-reference-fit

isolation:
  backend: apptainer
  mode: bind_paths
  # Optional. If omitted, GEPA uses a minimal default executor image and binds the
  # user-provided paths; it does not infer project packages from reference commands.
  # image: /abs/path/omilrec-executor.sif
  apptainer:
    executable: apptainer
    cleanenv: false
    containall: false
    writable_tmpfs: true
    # claude_home_template: /abs/path/claude-home-template

agent:
  command: claude
  timeout_seconds: 3600
  # model: opus         # optional: override the model (e.g. opus, sonnet, haiku, or a full model id)
  # env:                # optional: extra environment variables for the Claude subprocess
  #   ANTHROPIC_API_KEY: sk-ant-...
  #   ANTHROPIC_BASE_URL: https://your-api-proxy.example.com
  extra_args:
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Read,Edit,Write,Glob,Grep,Bash

safety:
  editable_paths:
    - OMILRECV2/src/**/*.cc
    - OMILRECV2/src/**/*.h
  frozen_paths:
    - tests/**
    - scripts/**
    - CMakeLists.txt
    - pyproject.toml
    - .gitattributes
    - benchmarks/*.md
  max_files_per_candidate: 3
