# Complete OMILREC project profile template for the current schema.
schema_version: 1
kind: project_profile
name: omilrec-juno

source:
  repo_path: ../../../omilrecv2
  default_ref: ff71809b81c6c887a276a14c29b4f86296f27571
  workspace_mode: git_worktree

environment:
  description: JUNO J26.1.1 on EL9 with GCC 11
  setup_commands:
    - source /cvmfs/juno.ihep.ac.cn/el9_amd64_gcc11/Release/J26.1.1/setup.sh
    - source InstallArea/setup.sh
  python_command: python
  dependency_policy: Use installed CVMFS packages only; do not install packages.

resources:
  data_files:
    - /data/juno/dingxf/inputs/index_12628_rtraw_1.json
    - /data/juno/dingxf/OMILREC_maps
  context_paths:
    - ../../../omilrec-br111-executor-pack/context/BR111_OPTIMIZATION_CONTEXT.md
    - ../../../omilrec-br111-executor-pack/context/SEEDS_BR111.md
    - ../../../omilrec-br111-executor-pack/context/SOURCE_INVENTORY_BR111.json
  skills:
    - omilrec-br111-opt-flow
    - OMILREC-dev-guide
    - reproduce-OMILREC-reference-fit
  readonly_assets:
    - source: ../../../omilrec-br111-executor-pack/assets/fixtures/time_pdf.bin
      target: TEMP/fixtures/time_pdf.bin
  pre_materialized_lfs_paths:
    - tests/fixtures/v107_rev1/*.bin
  generated_tracked_paths:
    - benchmarks/speed.csv
    - benchmarks/drift.csv
  hash_artifacts:
    - build/bin/test_fcn.exe
    - InstallArea/lib64/libOMILRECV2.so

agent:
  command: claude
  timeout_seconds: 3600
  extra_args:
    - --permission-mode
    - acceptEdits
    - --allowedTools
    - Read,Edit,Write,Glob,Grep,Bash

execution:
  lifecycle: materialize_once
  max_parallel_candidates: 3
  fail_fast: false
  runtime_backend: apptainer
  apptainer:
    image: /abs/path/omilrec-executor.sif
    executable: apptainer
    command: claude
    cleanenv: true
    containall: true
    writable_tmpfs: true
    container_repo: /workspace/repo
    container_artifacts: /workspace/artifacts
    container_scratch: /workspace/scratch
    container_home: /workspace/home
    claude_home_template: /abs/path/claude-home-template
    env_allowlist: []
    readonly_binds: []
    extra_binds: []

safety:
  editable_paths:
    - OMILRECV2/src/**/*.cc
    - OMILRECV2/src/**/*.h
  frozen_paths:
    - tests/**
    - scripts/**
    - CMakeLists.txt
    - pyproject.toml
    - .gitattributes
    - benchmarks/*.md
  max_files_per_candidate: 3
  max_commits_per_candidate: 1
